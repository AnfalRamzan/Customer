<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - Customer Due Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header i {
            font-size: 60px;
            color: #1e3c72;
            background: #e8eaf6;
            padding: 20px;
            border-radius: 50%;
        }
        
        .login-header h1 {
            font-size: 1.5rem;
            color: #1a1a2e;
            margin-top: 15px;
        }
        
        .login-header p {
            color: #666;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .form-group label i {
            margin-right: 8px;
            color: #1e3c72;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            background: white;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #1e3c72;
            box-shadow: 0 0 0 3px rgba(30,60,114,0.1);
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .password-wrapper input {
            padding-right: 45px;
        }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            font-size: 1.1rem;
        }
        
        .toggle-password:hover {
            color: #1e3c72;
        }
        
        .server-url-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }
        
        .server-url-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .server-url-header span {
            font-size: 0.8rem;
            color: #666;
            font-weight: 500;
        }
        
        .auto-detect-btn {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        
        .server-status {
            font-size: 0.7rem;
            margin-top: 8px;
            padding: 5px 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .server-status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .server-status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .server-status.warning {
            background: #fff3cd;
            color: #856404;
        }
        
        .server-url-input {
            display: flex;
            gap: 8px;
        }
        
        .server-url-input input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.85rem;
            font-family: monospace;
        }
        
        .server-url-input button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        
        .login-btn:active {
            transform: scale(0.98);
        }
        
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .error-msg {
            background: #fee;
            color: #dc3545;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
            text-align: center;
        }
        
        .role-selector {
            margin-bottom: 20px;
        }
        
        .role-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            display: block;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 25px;
            }
            
            .login-header i {
                font-size: 40px;
                padding: 15px;
            }
            
            .login-header h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-users"></i>
            <h1>Customer Due Manager</h1>
            <p>Pakistan - Payment Collection System</p>
        </div>
        
        <div id="errorMsg" class="error-msg"></div>
        
        <div class="server-url-section">
            <div class="server-url-header">
                <span><i class="fas fa-server"></i> Backend Server URL</span>
                <button type="button" class="auto-detect-btn" id="autoDetectBtn">
                    <i class="fas fa-search"></i> Auto Detect
                </button>
            </div>
            <div class="server-url-input">
                <input type="text" id="serverUrlInput" placeholder="http://localhost:3000/api">
                <button type="button" id="testConnectionBtn">
                    <i class="fas fa-plug"></i> Test
                </button>
            </div>
            <div id="serverStatus" class="server-status"></div>
        </div>
        
        <div class="role-selector">
            <span class="role-title"><i class="fas fa-user-tag"></i> Login As</span>
            <select id="roleSelect">
                <option value="admin">Administrator</option>
                <option value="user">Payment Receiver</option>
            </select>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" required placeholder="Enter username" autocomplete="off">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" required placeholder="Enter password">
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
    </div>
    
    <script>
        // Common ports to try for auto-detection
        const COMMON_PORTS = [3000, 5000, 8080, 3001, 4000, 8000, 9000, 5500, 4200, 5173];
        
        // Get stored server URL or default
        function getStoredServerUrl() {
            const stored = localStorage.getItem('backend_api_url');
            if (stored) return stored;
            // Try to get from current host
            const currentHost = window.location.hostname;
            if (currentHost !== 'localhost' && currentHost !== '127.0.0.1') {
                return `${window.location.protocol}//${currentHost}/api`;
            }
            return 'http://localhost:3000/api';
        }
        
        // Save server URL
        function saveServerUrl(url) {
            localStorage.setItem('backend_api_url', url);
        }
        
        // Test connection to a server URL
        async function testServerConnection(apiUrl) {
            try {
                // Remove trailing slash if exists
                apiUrl = apiUrl.replace(/\/$/, '');
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch(`${apiUrl}/health`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' },
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    const data = await response.json();
                    return { success: true, url: apiUrl, data };
                }
                return { success: false, error: `Server returned ${response.status}` };
            } catch (error) {
                if (error.name === 'AbortError') {
                    return { success: false, error: 'Connection timeout' };
                }
                return { success: false, error: error.message };
            }
        }
        
        // Auto-detect backend server
        async function autoDetectBackend() {
            const currentHost = window.location.hostname;
            const statusDiv = document.getElementById('serverStatus');
            const urlInput = document.getElementById('serverUrlInput');
            
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Scanning for server...';
            statusDiv.className = 'server-status';
            
            // First try same origin
            if (currentHost !== 'localhost' && currentHost !== '127.0.0.1') {
                const sameOriginUrl = `${window.location.protocol}//${currentHost}/api`;
                statusDiv.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Trying ${sameOriginUrl}...`;
                const result = await testServerConnection(sameOriginUrl);
                if (result.success) {
                    urlInput.value = result.url;
                    updateServerStatus(result.url, true);
                    saveServerUrl(result.url);
                    return result.url;
                }
            }
            
            // Try localhost and 127.0.0.1 with common ports
            const hostsToTry = ['localhost', '127.0.0.1'];
            
            for (const host of hostsToTry) {
                for (const port of COMMON_PORTS) {
                    const testUrl = `http://${host}:${port}/api`;
                    statusDiv.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Trying ${testUrl}...`;
                    
                    const result = await testServerConnection(testUrl);
                    if (result.success) {
                        urlInput.value = result.url;
                        updateServerStatus(result.url, true);
                        saveServerUrl(result.url);
                        return result.url;
                    }
                    
                    // Small delay to not overwhelm
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
            }
            
            // If nothing found
            statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Could not auto-detect server. Please enter manually.';
            statusDiv.className = 'server-status warning';
            return null;
        }
        
        // Update server status display
        function updateServerStatus(url, isConnected, error = null) {
            const statusDiv = document.getElementById('serverStatus');
            if (isConnected) {
                statusDiv.innerHTML = `<i class="fas fa-check-circle"></i> Connected to: ${url}`;
                statusDiv.className = 'server-status success';
            } else if (error) {
                statusDiv.innerHTML = `<i class="fas fa-times-circle"></i> Connection failed: ${error}`;
                statusDiv.className = 'server-status error';
            }
        }
        
        // Manual test connection
        async function manualTestConnection() {
            let url = document.getElementById('serverUrlInput').value.trim();
            if (!url) {
                updateServerStatus('', false, 'Please enter a server URL');
                return false;
            }
            
            // Add /api if not present
            if (!url.includes('/api')) {
                url = url.replace(/\/$/, '') + '/api';
            }
            
            const statusDiv = document.getElementById('serverStatus');
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Testing connection...';
            statusDiv.className = 'server-status';
            
            const result = await testServerConnection(url);
            if (result.success) {
                document.getElementById('serverUrlInput').value = result.url;
                updateServerStatus(result.url, true);
                saveServerUrl(result.url);
                return true;
            } else {
                updateServerStatus('', false, result.error);
                return false;
            }
        }
        
        let API_URL = '';
        
        // Initialize
        async function init() {
            const savedUrl = getStoredServerUrl();
            document.getElementById('serverUrlInput').value = savedUrl;
            
            // Auto-test saved URL
            const testResult = await testServerConnection(savedUrl);
            if (testResult.success) {
                API_URL = testResult.url;
                updateServerStatus(API_URL, true);
            } else {
                updateServerStatus('', false, testResult.error);
                // Try auto-detect
                const detected = await autoDetectBackend();
                if (detected) {
                    API_URL = detected;
                }
            }
        }
        
        // Login function
        async function login(username, password) {
            if (!API_URL) {
                // Try to get current URL from input
                let url = document.getElementById('serverUrlInput').value.trim();
                if (!url) {
                    throw new Error('Please enter backend server URL');
                }
                if (!url.includes('/api')) {
                    url = url.replace(/\/$/, '') + '/api';
                }
                
                const testResult = await testServerConnection(url);
                if (!testResult.success) {
                    throw new Error(`Cannot connect to server: ${testResult.error}`);
                }
                API_URL = testResult.url;
                saveServerUrl(API_URL);
                updateServerStatus(API_URL, true);
            }
            
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            const result = await response.json();
            
            if (!response.ok) {
                throw new Error(result.message || 'Login failed');
            }
            
            return result;
        }
        
        // DOM Elements
        const roleSelect = document.getElementById('roleSelect');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const autoDetectBtn = document.getElementById('autoDetectBtn');
        const testConnectionBtn = document.getElementById('testConnectionBtn');
        const errorMsgDiv = document.getElementById('errorMsg');
        
        // Toggle password visibility
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });
        
        // Role selection auto-fill
        roleSelect.addEventListener('change', () => {
            const role = roleSelect.value;
            if (role === 'admin') {
                usernameInput.value = 'admin';
                passwordInput.value = 'admin123';
            } else if (role === 'user') {
                usernameInput.value = 'user';
                passwordInput.value = 'user123';
            }
        });
        
        // Auto-fill default on page load
        usernameInput.value = 'admin';
        passwordInput.value = 'admin123';
        
        // Auto detect button
        autoDetectBtn.addEventListener('click', async () => {
            autoDetectBtn.disabled = true;
            autoDetectBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Scanning...';
            
            const detected = await autoDetectBackend();
            
            autoDetectBtn.disabled = false;
            autoDetectBtn.innerHTML = '<i class="fas fa-search"></i> Auto Detect';
            
            if (detected) {
                API_URL = detected;
                showTemporaryMessage('Server detected successfully!', 'success');
            } else {
                showTemporaryMessage('Could not detect server. Please enter URL manually.', 'error');
            }
        });
        
        // Test connection button
        testConnectionBtn.addEventListener('click', async () => {
            testConnectionBtn.disabled = true;
            testConnectionBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            const success = await manualTestConnection();
            if (success) {
                API_URL = document.getElementById('serverUrlInput').value;
                showTemporaryMessage('Connection successful!', 'success');
            } else {
                showTemporaryMessage('Connection failed. Check server URL.', 'error');
            }
            
            testConnectionBtn.disabled = false;
            testConnectionBtn.innerHTML = '<i class="fas fa-plug"></i> Test';
        });
        
        // Show temporary message
        function showTemporaryMessage(message, type) {
            errorMsgDiv.textContent = message;
            errorMsgDiv.style.backgroundColor = type === 'success' ? '#d4edda' : '#f8d7da';
            errorMsgDiv.style.color = type === 'success' ? '#155724' : '#721c24';
            errorMsgDiv.style.display = 'block';
            setTimeout(() => {
                errorMsgDiv.style.display = 'none';
                errorMsgDiv.style.backgroundColor = '';
                errorMsgDiv.style.color = '';
            }, 3000);
        }
        
        // Login form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            if (!username || !password) {
                errorMsgDiv.textContent = 'Please enter username and password';
                errorMsgDiv.style.display = 'block';
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Connecting...';
            errorMsgDiv.style.display = 'none';
            
            try {
                const result = await login(username, password);
                
                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));
                
                window.location.href = 'index.html';
            } catch (error) {
                errorMsgDiv.textContent = error.message;
                errorMsgDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });
        
        // Enter key submit
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
        
        // Clear error on input
        usernameInput.addEventListener('input', () => {
            errorMsgDiv.style.display = 'none';
        });
        passwordInput.addEventListener('input', () => {
            errorMsgDiv.style.display = 'none';
        });
        
        // Start initialization
        init();
    </script>
</body>
</html>
